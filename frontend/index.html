<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>BookARide — Auckland Airport Transfers & Private Shuttles</title>
    <meta name="description" content="Auckland's trusted private airport transfer service. Door-to-door to Auckland, Hamilton & Whangarei airports. Get an instant price online — no hidden fees." />
    <meta name="keywords" content="Auckland airport transfer, airport shuttle Auckland, private transfer Auckland, book a ride NZ" />
    <link rel="canonical" href="https://bookaride.co.nz" />

    <!-- Open Graph (Facebook, iMessage, WhatsApp link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bookaride.co.nz" />
    <meta property="og:title" content="BookARide — Auckland Airport Transfers" />
    <meta property="og:description" content="Door-to-door private airport transfers across Auckland. Instant online pricing, flight tracking included, free cancellation 24h." />
    <meta property="og:image" content="https://bookaride.co.nz/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_NZ" />
    <meta property="og:site_name" content="BookARide NZ" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BookARide — Auckland Airport Transfers" />
    <meta name="twitter:description" content="Door-to-door private airport transfers. Instant online pricing, flight tracking, free cancellation." />
    <meta name="twitter:image" content="https://bookaride.co.nz/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#D4AF37" />

    <!-- Structured data — Local Business (Google rich results) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "BookARide NZ",
      "description": "Private airport transfer service in Auckland, New Zealand",
      "url": "https://bookaride.co.nz",
      "telephone": "+6421880793",
      "email": "info@bookaride.co.nz",
      "address": { "@type": "PostalAddress", "addressLocality": "Auckland", "addressCountry": "NZ" },
      "geo": { "@type": "GeoCoordinates", "latitude": -36.8485, "longitude": 174.7633 },
      "openingHours": "Mo-Su 00:00-24:00",
      "priceRange": "$$",
      "sameAs": ["https://facebook.com/bookaridenz", "https://instagram.com/bookaridenz"]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
